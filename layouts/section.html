{{ define "main" }}
<article class="post-single max-w-5xl mx-auto">
  {{- partial "title.html" . -}}
  {{- if .Content }}
  <div class="post-content">
    {{ .Content }}
  </div>
  {{- end }}

  {{- $pages := .Pages -}}
  {{- if eq .Type "course" -}}
    {{- $pages = .Pages.ByParam "week" -}}
  {{- end -}}
  {{- partial "page-list.html" (dict "title" "Section" "pages" $pages "showDate" true) }}
</article>
{{ end }}
